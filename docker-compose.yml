networks:
  aether-ai:
    external: true

services:
  gemma-4-31b-it:
    container_name: gemma-4-31b-it
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_INFERENCE: ${INSTALL_INFERENCE:-false}
    image: aether-runner:latest
    runtime: nvidia
    networks:
      - aether-ai
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      NVIDIA_VISIBLE_DEVICES: "${AETHER_GPU_ID:-1}"
      HF_HOME: /cache
      HF_HUB_CACHE: /cache/.hf-cache
    ports:
      - "${AETHER_BIND_IP:-0.0.0.0}:${AETHER_HOST_PORT:-8001}:8000"
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - ./modelcards:/app/modelcards:ro
      - ./data/cache:/app/data/cache
      - ./data/tmp:/app/data/tmp
      - ./logs/gemma-4-31b-it:/logs
      - /mnt/aetherpro/cache:/cache
      - /mnt/aetherpro-extra1/models:/models
    command: >
      uvicorn aether_runner.main:app
      --host 0.0.0.0
      --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H 'Authorization: Bearer ${AETHER_HEALTHCHECK_KEY}' http://localhost:8000/v1/models >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 45s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${AETHER_GPU_ID:-1}"]
              capabilities: [gpu]
